version: '3.8'

services:
  # ── Python ML Microservice (Railway in production, Docker locally) ──────────
  ml-service:
    build:
      context: .
      dockerfile: ml-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Node.js Frontend + API Proxy ────────────────────────────────────────────
  trustops-app:
    build: .
    ports:
      - "5173:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - ML_API_URL=http://ml-service:8000
      # Optional: uncomment if running local Ollama on the host
      # - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      ml-service:
        condition: service_healthy
    restart: always

networks:
  default:
    name: trustops-network
